<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>تحدي اللغة العربية AI</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#18051c;color:white}
button,textarea,input{font-family:inherit}
.hero{min-height:100svh;position:relative;overflow:hidden;background:#18051c}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.08)}
.shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(24,5,28,.15),rgba(24,5,28,.65))}
.content{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px}
h1{font-size:clamp(36px,6vw,78px);color:#ffe39b;text-shadow:0 4px 18px #3b071f;margin:0}
p{font-size:clamp(17px,2vw,24px);line-height:1.9;font-weight:900}
.gates{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:min(1000px,96vw);margin-top:18px}
.gate{border:none;border-radius:24px;padding:22px;color:white;font-size:20px;font-weight:900;min-height:140px;box-shadow:0 16px 32px rgba(0,0,0,.25);cursor:pointer}
.g1{background:linear-gradient(135deg,#7c3aed,#4c1d95)}.g2{background:linear-gradient(135deg,#0f766e,#14b8a6)}.g3{background:linear-gradient(135deg,#92400e,#f59e0b)}.g4{background:linear-gradient(135deg,#8f1d4b,#ec4899)}
.score{position:fixed;top:12px;right:12px;z-index:5;background:rgba(58,7,31,.82);border-radius:16px;padding:10px 14px;font-weight:900}
.panel{display:none;position:fixed;inset:0;z-index:10;align-items:center;justify-content:center;background:rgba(22,5,18,.78);backdrop-filter:blur(8px);padding:16px}
.panel.show{display:flex}
.card{width:min(960px,96vw);max-height:92svh;overflow:auto;background:linear-gradient(135deg,#fff8ec,#fff);color:#3b071f;border-radius:30px;padding:26px;border:4px solid #f5b942;box-shadow:0 30px 90px rgba(0,0,0,.52);text-align:right}
.card h2{font-size:clamp(30px,5vw,54px);color:#8f1d4b;margin:0}
.q{font-size:clamp(22px,3vw,32px);font-weight:900;line-height:1.7;margin:18px 0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{border:2px solid #f1ccda;background:white;color:#3b071f;border-radius:18px;padding:16px;font-size:18px;font-weight:900;text-align:right;cursor:pointer}
.correct{background:#dcfce7!important;border-color:#22c55e!important;color:#166534!important}
.wrong{background:#fee2e2!important;border-color:#ef4444!important;color:#991b1b!important}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:14px;font-weight:900;line-height:1.8}
.feedback.good{display:block;background:#dcfce7;color:#166534}
.feedback.bad{display:block;background:#fee2e2;color:#991b1b}
.btn{border:none;border-radius:18px;padding:14px 22px;font-size:17px;font-weight:900;margin:8px;cursor:pointer}
.primary{background:linear-gradient(135deg,#8f1d4b,#c92d68);color:white}
.secondary{background:#f1d5df;color:#6b1235}
textarea,input{width:100%;border:2px solid #f1ccda;border-radius:18px;padding:14px;font-size:17px;color:#3b071f;background:white;outline:none}
textarea{min-height:190px;line-height:1.9;resize:vertical}
.aiGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.aiQ{background:#fff7ed;color:#3b071f;border:1px solid #f5d4a1;border-radius:18px;padding:14px;line-height:1.8;font-weight:800}
.table{width:100%;border-collapse:separate;border-spacing:0 8px;margin-top:12px}
.table td,.table th{background:#fff7ed;color:#3b071f;padding:12px;text-align:right}
.table th{background:#8f1d4b;color:white}
.badge{display:inline-block;background:linear-gradient(135deg,#fff3ba,#f5b942);color:#6b3b00;border-radius:16px;padding:10px 12px;font-weight:900;margin:4px}
@media(max-width:760px){
 .hero{min-height:auto}.bg{position:relative;height:40svh;object-fit:cover;object-position:33% center}.shade{display:none}
 .content{min-height:auto;padding:12px;background:linear-gradient(180deg,#3b071f,#fff3df);color:#3b071f}
 h1{font-size:34px} p{color:white}
 .gates{grid-template-columns:1fr} .gate{min-height:96px;text-align:right}
 .panel{align-items:flex-end;padding:0}.card{width:100%;max-height:88svh;border-radius:26px 26px 0 0;border-left:0;border-right:0;border-bottom:0;padding:18px}
 .options,.aiGrid{grid-template-columns:1fr}
 .btn{width:100%}
}
</style>
</head>
<body>
<div class="score">النقاط: <span id="score">0</span> ⭐ | الإنجازات: <span id="ach">0</span></div>
<section class="hero">
 <img src="assets/game_world.png?v=ai3" class="bg">
 <div class="shade"></div>
 <div class="content">
  <h1>تحدي اللغة العربية AI</h1>
  <p id="caption">بوابات، مولّد أسئلة ذكي، لوحة طالبات، وإنجازات.</p>
  <div class="gates">
    <button class="gate g1" onclick="openGame()">🎮 التحدي الشامل</button>
    <button class="gate g2" onclick="openAI()">🤖 مولّد الأسئلة الذكي</button>
    <button class="gate g3" onclick="openLeaderboard()">🏆 لوحة الطالبات</button>
    <button class="gate g4" onclick="openAchievements()">🏅 الإنجازات</button>
  </div>
 </div>
</section>
<section id="panel" class="panel"><div class="card">
 <h2 id="title">تحدي اللغة العربية</h2>
 <div id="dynamic"></div>
</div></section>
<audio id="correctSound" src="assets/correct.wav" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.wav" preload="auto"></audio>
<script>
const bank={"mixed": [{"q": "ما الفكرة العامة لنص «العمل الجماعي»؟", "options": ["أهمية العمل الجماعي", "وصف السوق", "فوائد النوم", "أهمية السفر"], "a": "أهمية العمل الجماعي", "tip": "الفكرة العامة تجمع معنى النص كله."}, {"q": "ماذا يريد الحفيد من جدته في درس «رسالة إلى جدتي»؟", "options": ["أن تحكي له أجمل الحكايات", "أن يسافر بعيدًا", "أن يترك الرسائل", "أن يغلق البيت"], "a": "أن تحكي له أجمل الحكايات", "tip": "السؤال مرتبط بمشاعر الشوق والحنين."}, {"q": "صوغي اسم الفاعل من الفعل: كتب.", "options": ["كاتب", "مكتوب", "كتاب", "كتابة"], "a": "كاتب", "tip": "اسم الفاعل من الفعل الثلاثي يأتي غالبًا على وزن فاعل."}, {"q": "ما نوع المفعول المطلق في: «سجدتُ لله سجودًا»؟", "options": ["مؤكد للفعل", "مبين للنوع", "مبين للعدد", "فاعل"], "a": "مؤكد للفعل", "tip": "إذا لم يذكر وصف أو عدد فهو غالبًا مؤكد للفعل."}, {"q": "اختاري الكتابة الصحيحة عند الإضافة:", "options": ["معلما العلوم", "معلمان العلوم", "معلمين العلوم", "معلمون العلوم"], "a": "معلما العلوم", "tip": "عند الإضافة تُحذف نون المثنى."}]};
const salama={"correct": ["أحسنتِ يا بطلة السلام!", "رائعة! إجابة ذكية جدًا.", "سلامة فخورة بكِ.", "مذهلة! واصلي التحدي."], "wrong": ["قريبة جدًا، حاولي مرة أخرى.", "لا بأس يا بطلة، فكّري قليلًا.", "أنتِ تستطيعين، أعيدي المحاولة بثقة."]};
let score=Number(localStorage.getItem("aiArabicScore2")||0);
let achievements=JSON.parse(localStorage.getItem("aiArabicAchievements2")||"[]");
let currentItem=null, answered=false;
function update(){document.getElementById("score").textContent=score;document.getElementById("ach").textContent=achievements.length;}
update();
function save(){localStorage.setItem("aiArabicScore2",score);localStorage.setItem("aiArabicAchievements2",JSON.stringify(achievements));update();}
function panel(title){document.getElementById("title").textContent=title;document.getElementById("panel").classList.add("show");}
function closePanel(){document.getElementById("panel").classList.remove("show");}
function randomOf(a){return a[Math.floor(Math.random()*a.length)];}
function addAchievement(a){if(!achievements.includes(a)){achievements.push(a);save();}}
function openGame(){panel("التحدي الشامل");nextQuestion();}
function nextQuestion(){
 answered=false; currentItem=randomOf(bank.mixed);
 document.getElementById("dynamic").innerHTML=`<div class="q">${currentItem.q}</div><div id="options" class="options"></div><div id="feedback" class="feedback"></div><div class="aiQ">${currentItem.tip}</div><button class="btn primary" onclick="nextQuestion()">سؤال جديد ✨</button><button class="btn secondary" onclick="closePanel()">العودة</button>`;
 const box=document.getElementById("options");
 [...currentItem.options].sort(()=>Math.random()-.5).forEach(o=>{const b=document.createElement("button");b.className="option";b.textContent=o;b.onclick=()=>check(o,b);box.appendChild(b);});
}
function check(selected,btn){
 if(answered)return; answered=true;
 document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(b.textContent===currentItem.a)b.classList.add("correct");});
 const fb=document.getElementById("feedback");
 if(selected===currentItem.a){btn.classList.add("correct");score+=10;if(score>=50)addAchievement("نجمة البداية");if(score>=100)addAchievement("فارسة القراءة");if(score>=150)addAchievement("بطلة اللغة العربية");save();fb.className="feedback good";fb.textContent=randomOf(salama.correct)+" +10 نقاط";document.getElementById("correctSound").play().catch(()=>{});}
 else{btn.classList.add("wrong");fb.className="feedback bad";fb.textContent=randomOf(salama.wrong)+" الإجابة الصحيحة هي: "+currentItem.a;document.getElementById("wrongSound").play().catch(()=>{});}
}
function openAI(){
 panel("مولّد الأسئلة الذكي");
 document.getElementById("dynamic").innerHTML=`<p>الصقي أي نص عربي، وستحصلين على أسئلة تدريبية فورًا. هذه نسخة محلية، والربط الحقيقي بالذكاء الاصطناعي يحتاج Backend وOpenAI API.</p><textarea id="aiText" placeholder="الصقي النص هنا..."></textarea><button class="btn primary" onclick="generateAIQuestions()">توليد الأسئلة الآن 🤖</button><button class="btn secondary" onclick="closePanel()">العودة</button><div id="aiOutput" class="aiGrid"></div>`;
}
function generateAIQuestions(){
 const text=(document.getElementById("aiText").value||"").trim(), out=document.getElementById("aiOutput");out.innerHTML="";
 if(!text){out.innerHTML='<div class="aiQ">اكتبي نصًا أولًا.</div>';return;}
 const sentences=text.split(/[.؟!\n]+/).map(s=>s.trim()).filter(s=>s.length>12);
 const words=text.replace(/[،.؟!؛:]/g," ").split(/\s+/).filter(w=>w.length>3);
 const sentence=sentences[0]||text.slice(0,80), word=words[Math.floor(Math.random()*words.length)]||"كلمة";
 const generated=[
  ["فهم عام","ما الفكرة العامة للنص؟","الإجابة بحسب مضمون النص."],
  ["مفردات","استخرجي من النص كلمة مهمة وبيّني معناها.",word],
  ["استنتاج","ما القيمة المستفادة من النص؟","تستنتجها الطالبة من النص."],
  ["تعبير","ضعي عنوانًا مناسبًا للنص.","عنوان مرتبط بالفكرة العامة."],
  ["تفكير عالٍ","كوّني سؤالًا إجابته من العبارة: «"+sentence+"».","سؤال من إنشاء الطالبة."]
 ];
 generated.forEach(i=>out.innerHTML+=`<div class="aiQ"><b>${i[0]}</b><br>${i[1]}<br><small>نموذج إجابة: ${i[2]}</small></div>`);
 addAchievement("مستكشفة الذكاء الاصطناعي");save();
}
function openLeaderboard(){
 panel("لوحة الطالبات والترتيب");
 const student=localStorage.getItem("studentName")||"بطلة السلام";
 const rows=[["مها",250,"بطلة القراءة"],["نورة",220,"نجمة القواعد"],["العنود",180,"فارسة الإملاء"],[student,score,achievements[achievements.length-1]||"في بداية الرحلة"]].sort((a,b)=>b[1]-a[1]);
 document.getElementById("dynamic").innerHTML=`<input id="studentInput" value="${student}" placeholder="اكتبي اسم الطالبة"><button class="btn primary" onclick="saveStudentName()">حفظ الاسم</button><button class="btn secondary" onclick="closePanel()">العودة</button><table class="table"><tr><th>الترتيب</th><th>الطالبة</th><th>النقاط</th><th>الإنجاز</th></tr>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</table>`;
}
function saveStudentName(){localStorage.setItem("studentName",document.getElementById("studentInput").value||"بطلة السلام");openLeaderboard();}
function openAchievements(){
 panel("الإنجازات والشارات");
 document.getElementById("dynamic").innerHTML=`<p>كلما زادت نقاطك، فُتحت شارات جديدة.</p><div>${achievements.length?achievements.map(a=>`<span class="badge">${a}</span>`).join(""):"<span class='badge'>ابدئي اللعب لفتح الإنجازات</span>"}</div><button class="btn secondary" onclick="closePanel()">العودة</button>`;
}
</script>
</body>
</html>
